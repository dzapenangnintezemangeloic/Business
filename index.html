<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aphzone Launcher</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: "Segoe UI", Arial, sans-serif; background: #f6f7f2; color: #181a1f; }
    main { width: min(720px, calc(100% - 28px)); background: #fff; border: 1px solid #d9ded6; border-radius: 8px; padding: 28px; box-shadow: 0 18px 50px rgba(24, 26, 31, .10); }
    img { width: 72px; height: 72px; object-fit: contain; border-radius: 8px; background: #edf7f3; border: 1px solid #d9ded6; }
    h1 { margin: 14px 0 8px; font-size: clamp(32px, 6vw, 52px); }
    p { color: #67717f; line-height: 1.55; }
    a { display: inline-flex; min-height: 44px; align-items: center; padding: 10px 14px; border-radius: 8px; text-decoration: none; background: #0d7c66; color: #fff; margin-top: 8px; }
  </style>
</head>
<body>
  <main>
    <img src="many activities and parameters/logo.png" alt="Aphzone logo">
    <h1>Aphzone</h1>
    <p>Start the local server, then open the app through the index page below. This keeps login, uploads, backups, and database saving working correctly.</p>
    <a href="http://localhost:3030/index.html">Open Aphzone index</a>
  </main>
</body>
</html>
